<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="favicon.ico">
<link rel="manifest" href="manifest.json">
<title>Riniser</title>

<style>
:root {
  --background-color: #fefdfc;
  --foreground-color: #000;
  --accent-color: #12488b;
  --hover-color: #2a7bde;
  --button-text-color: #fefdfc;
  --warning-color: #c01c28;
}

@media (prefers-color-scheme: dark) {
  :root {
    --background-color: #1d1d20;
    --foreground-color: #fefdfc;
    --accent-color: #2a7bde;
    --hover-color: #12488b;
    --button-text-color: #fefdfc;
    --warning-color: #f66151;
  }
}

body {
  background: var(--background-color);
  color: var(--foreground-color);
  font-family: system-ui, sans-serif;
  padding: 2rem;
}

input[type="file"] {
  display: none;
}

input[type="checkbox"] {
  display: inline-block;
  margin-top: 1.5rem;
}

/* style the label as a button */
.file-button {
  display: inline-block;
  padding: 0.6rem 1rem;
  color: var(--button-text-color);
  background-color: var(--accent-color);
  border: 2px solid var(--accent-color);
  border-radius: 6px;
  cursor: pointer;
  font-weight: 500;
}

.file-button:hover {
  background: var(--hover-color);
  border: 2px solid var(--hover-color);
}

button.file-button {
  color: var(--button-text-color);
  font: inherit;
}

.warning {
  margin-top: 1rem;
  display: none;
  color: var(--warning-color);
}

#download-button {
  display: none;
}

#resized-image {
  margin-top: 1.5rem;
  margin-bottom: 1.5rem;
  max-width: 100%;
  height: auto;
  border-color: var(--accent-color);
}

 /* The switch - the box around the slider */
.switch {
  margin-top: 1.5rem;
  margin-right: 0.5rem;
  position: relative;
  display: inline-block;
  width: 60px;
  height: 34px;
}

/* Hide default HTML checkbox */
.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

/* The slider */
.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  -webkit-transition: .4s;
  transition: .4s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  -webkit-transition: .4s;
  transition: .4s;
}

input:checked + .slider {
  background-color: var(--accent-color);
}

input:focus + .slider {
  box-shadow: 0 0 1px var(--accent-color);
}

input:checked + .slider:before {
  -webkit-transform: translateX(26px);
  -ms-transform: translateX(26px);
  transform: translateX(26px);
}

/* Rounded sliders */
.slider.round {
  border-radius: 34px;
}

.slider.round:before {
  border-radius: 50%;
}

</style>
</head>

<body>
  <div>
    <label class="file-button">
      Selecteer een afbeelding
    <input type="file" id="image-input" accept="image/*" />
    </label>
  </div>
  <div>
    <label class="switch">
      <input type="checkbox" id="is-label" name="is-label" value="0">
      <span class="slider round"></span>
    </label>
    Maak verzendlabel
  </div>
  <div class="warning" id="resolution-warning"></div>
  <div class="warning" id="aspect-warning"></div>
  <div><img id="resized-image"></div>
  <div>
    <button id="download-button" class="file-button" hidden>
      Download afbeelding
    </button>
  </div>
  <script src="riniser.js"></script>
</body>
</html>
